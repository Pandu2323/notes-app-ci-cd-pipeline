version: '3.9'

# ── Notes App - Development Stack ─────────────────────────────────────────────
# Usage: docker compose up --build

services:

  # ── Backend API ─────────────────────────────────────────────────────────────
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
      target: production
    container_name: notes-backend
    restart: unless-stopped
    ports:
      - "5000:5000"
    environment:
      NODE_ENV: production
      PORT: 5000
      CORS_ORIGIN: "http://localhost:3000"
      APP_VERSION: "${APP_VERSION:-1.0.0}"
    volumes:
      - notes_data:/app/data
    networks:
      - notes-net
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:5000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s

  # ── Frontend ─────────────────────────────────────────────────────────────────
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      target: production
      args:
        REACT_APP_VERSION: "${APP_VERSION:-1.0.0}"
    container_name: notes-frontend
    restart: unless-stopped
    ports:
      - "3000:80"
    depends_on:
      backend:
        condition: service_healthy
    networks:
      - notes-net
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:80"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 15s

# ── Volumes ───────────────────────────────────────────────────────────────────
volumes:
  notes_data:
    name: notes_app_data
    driver: local

# ── Networks ──────────────────────────────────────────────────────────────────
networks:
  notes-net:
    name: notes_network
    driver: bridge
